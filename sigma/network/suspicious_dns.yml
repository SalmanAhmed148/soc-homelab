title: Suspicious DNS Query - C2 Communication
status: experimental
description: Detects DNS queries to suspicious domains
logsource:
    category: dns
detection:
    selection:
        query|contains:
            - '.b64'
            - '.tk'
            - '.ml'
            - 'pastebin'
            - 'githubusercontent'
    condition: selection
falsepositives:
    - Legitimate services
level: medium
tags:
    - attack.command_and_control
    - attack.t1071.004
